<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: computers</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow-x: hidden;
        background: #f0f0f0;
    }

    /* Top bar container */
    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
    }

    /* Images in top bar */
    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    /* Center image in top bar */
    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left {
        order: 1;
    }

    .top-right {
        order: 3;
    }

    /* Middle content */
    .content {
        width: 80%;
        margin: 5vh auto;
        font-size: calc(16px + 0.5vw);
        text-align: center;
        line-height: 1.6;
    }
    .btn {
    position: absolute;
    transform: translate(-50%, -50%) scale(var(--scale, 1));
    width: 20vh;
    height: auto;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 20;
    top: 40:
}

/* Hover effect */
.clickable img:hover {
    transform: translate(-50%, -50%) scale(calc(var(--scale, 1) * 1.1));
    opacity: 0.85;
    cursor: pointer;
}

    /* Mobile adjustments */
    @media (max-width: 768px) {
        .top-bar {
            height: 18vh;
        }

        /* 🔽 Make images smaller on mobile */
        .top-bar img {
            height: 55%;        /* smaller than before */
            max-height: 80px;   /* cap size */
        }

        .top-center {
            height: 55%; /* keep center consistent */
        }

        .content {
            width: 90%;
            font-size: calc(14px + 1vw);
        }
        
}

        
    }
</style>
</head>
<body>

<div class="top-bar">
    <a href="/menu.html" class="home-button">
        <img src="assets/images/menu.png" alt="Menu" class="top-left">
    </a>

    <img src="assets/images/computers.jpg" alt="Center Image" class="top-center">

    <a href="/" class="home-button">
    <img src="assets/images/megan.png" alt="Megan" class="top-right">
</a>
</div>

<div class="content">
     <a href=" https://queensu.scholaris.ca/items/c05439a4-154b-462d-9755-60c4cef9574a" class="clickable">
        <img src="assets/images/thesis.jpg" class="btn" id="thesis" alt="thesis">
    </a>

</div>
</body>
</html>
