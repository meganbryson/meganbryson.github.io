<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow-x: hidden;
        background: #f0f0f0;
        position: relative;
        min-height: 200vh;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 10;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left { order: 1; }
    .top-right { order: 3; }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        will-change: transform;
    }

    .photo:hover {
        transform: scale(1.05);
        z-index: 20;
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png">
    </a>
</div>

<script>
const PHOTO_SCALE = 0.18;
const TOTAL_PHOTOS = 24;

const photosData = [];

function createPhotos() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const pageHeight = document.body.scrollHeight;

    const spawnMinY = topBarHeight;
    const spawnMaxY = pageHeight * 0.5; // 🔥 only top 50%

    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        img.onerror = () => {
            console.warn("Failed to load:", img.src);
            img.remove();
        };

        document.body.appendChild(img);

        img.onload = () => {
            const baseWidth = viewportWidth * PHOTO_SCALE;
            const aspectRatio = img.naturalHeight / img.naturalWidth;

            const width = baseWidth;
            const height = baseWidth * aspectRatio;

            let x = Math.random() * (viewportWidth - width);
            let y = Math.random() * (spawnMaxY - spawnMinY - height) + spawnMinY;

            img.style.width = width + "px";
            img.style.height = height + "px";

            const vx = (Math.random() - 0.5) * 0.3;
            const vy = (Math.random() - 0.5) * 0.3;

            photosData.push({
                el: img,
                x, y,
                width, height,
                vx, vy
            });
        };
    }
}

function animate() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const pageHeight = document.body.scrollHeight;
    const maxY = pageHeight * 0.5; // 🔥 movement capped to top 50%

    photosData.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        // left/right bounce
        if (p.x <= 0 || p.x + p.width >= viewportWidth) {
            p.vx *= -1;
        }

        // top bar boundary
        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
        }

        // bottom boundary (50% of page)
        if (p.y + p.height >= maxY) {
            p.y = maxY - p.height;
            p.vy *= -1;
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    setTimeout(animate, 100);
};
</script>

</body>
</html>
