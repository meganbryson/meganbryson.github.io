<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/png" href="/assets/images/flav.png?">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        background: #f0f0f0;
        position: relative;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 1000;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left { order: 1; }
    .top-right { order: 3; }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        z-index: 1;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .photo:hover {
        transform: scale(1.2);
    }

     /* Mobile adjustments */
    @media (max-width: 768px) {
        .top-bar {
            height: 18vh;
        }

        /* 🔽 Make images smaller on mobile */
        .top-bar img {
            height: 55%;        /* smaller than before */
            max-height: 80px;   /* cap size */
        }

        .top-center {
            height: 55%; /* keep center consistent */
        }

        .content {
            width: 90%;
            font-size: calc(14px + 1vw);
        }
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" class="top-left">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png" class="top-right">
    </a>
</div>

<script>
const GLOBAL_SIZE_MULTIPLIER = 0.65;

const DESKTOP_EXPAND_MULTIPLIER = 0.45;
const MOBILE_EXPAND_MULTIPLIER = 0.55;

const PHOTO_SCALE = 0.18;
const HERO_SCALE = 0.35;

const TOTAL_PHOTOS = 25;

const BASE_SPEED = 0.3;
const SPEED_VARIATION = 1.25;

const MOBILE_SCALE_MULTIPLIER = 2.0;

const photosData = [];
let topZ = 100;

function bringToFront(el) {
    topZ++;
    el.style.zIndex = topZ;
}

function addClickExpand(img, dataObj) {
    img.addEventListener("click", () => {
        if (img.dataset.expanded === "true") return;

        img.dataset.expanded = "true";
        bringToFront(img);

        const original = {
            width: dataObj.width,
            height: dataObj.height,
            x: dataObj.x,
            y: dataObj.y
        };

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const isMobile = vw <= 768;

        const aspect = img.naturalHeight / img.naturalWidth;

        const isHero = img.src.includes("text.jpg");

        let maxWidth, maxHeight;

        if (isMobile) {

            // 🔥 FIX: HERO DOES NOT SHRINK ON MOBILE
            if (isHero) {
                maxWidth = vw * DESKTOP_EXPAND_MULTIPLIER;
                maxHeight = vh * DESKTOP_EXPAND_MULTIPLIER;
            } else {
                maxWidth = vw * MOBILE_EXPAND_MULTIPLIER;
                maxHeight = vh * MOBILE_EXPAND_MULTIPLIER;
            }

        } else {
            maxWidth = vw * DESKTOP_EXPAND_MULTIPLIER;
            maxHeight = vh * DESKTOP_EXPAND_MULTIPLIER;
        }

        let targetWidth = maxWidth;
        let targetHeight = targetWidth * aspect;

        if (targetHeight > maxHeight) {
            targetHeight = maxHeight;
            targetWidth = targetHeight / aspect;
        }

        let targetX = (vw - targetWidth) / 2;
        let targetY = (vh - targetHeight) / 2;

        const pad = 12;
        targetX = Math.max(pad, Math.min(targetX, vw - targetWidth - pad));
        targetY = Math.max(pad, Math.min(targetY, vh - targetHeight - pad));

        dataObj.width = targetWidth;
        dataObj.height = targetHeight;
        dataObj.x = targetX;
        dataObj.y = targetY;

        img.style.width = targetWidth + "px";
        img.style.height = targetHeight + "px";

        setTimeout(() => {
            dataObj.width = original.width;
            dataObj.height = original.height;
            dataObj.x = original.x;
            dataObj.y = original.y;

            img.style.width = original.width + "px";
            img.style.height = original.height + "px";

            img.dataset.expanded = "false";
        }, 3000);
    });
}

function getScaledWidth(baseScale, viewportWidth, isMobile) {
    let scale = baseScale * GLOBAL_SIZE_MULTIPLIER;
    if (isMobile) scale *= MOBILE_SCALE_MULTIPLIER;
    return viewportWidth * scale;
}

function createPhotos() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const isMobile = vw <= 768;

    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        img.onerror = () => img.remove();
        document.body.appendChild(img);

        img.onload = () => {
            const width = getScaledWidth(PHOTO_SCALE, vw, isMobile);
            const aspect = img.naturalHeight / img.naturalWidth;
            const height = width * aspect;

            let x = Math.random() * (vw - width);
            let y = Math.random() * (vh - height - topBarHeight) + topBarHeight;

            img.style.width = width + "px";
            img.style.height = height + "px";

            const speedMult = 1 + Math.random() * (SPEED_VARIATION - 1);
            const vx = (Math.random() - 0.5) * BASE_SPEED * speedMult;
            const vy = (Math.random() - 0.5) * BASE_SPEED * speedMult;

            const obj = { el: img, x, y, width, height, vx, vy };
            photosData.push(obj);

            addClickExpand(img, obj);
        };
    }

    const hero = document.createElement("img");
    hero.src = `assets/images/shots/text.jpg`;
    hero.className = "photo";

    hero.onerror = () => hero.remove();
    document.body.appendChild(hero);

    hero.onload = () => {
        const width = getScaledWidth(HERO_SCALE, vw, isMobile);
        const aspect = hero.naturalHeight / hero.naturalWidth;
        const height = width * aspect;

        let x = (vw - width) / 2;
        let y = (vh - height) / 2;

        hero.style.width = width + "px";
        hero.style.height = height + "px";
        hero.style.zIndex = 9999;

        const vx = (Math.random() - 0.5) * BASE_SPEED;
        const vy = (Math.random() - 0.5) * BASE_SPEED;

        const obj = { el: hero, x, y, width, height, vx, vy };
        photosData.push(obj);

        addClickExpand(hero, obj);
    };
}

function animate() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    photosData.forEach(p => {
        if (p.el.dataset.expanded === "true") return;

        p.x += p.vx;
        p.y += p.vy;

        if (p.x <= 0 || p.x + p.width >= vw) p.vx *= -1;

        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
        }

        if (p.y + p.height >= vh) {
            p.y = vh - p.height;
            p.vy *= -1;
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    setTimeout(animate, 100);
};
</script>

</body>
</html>
