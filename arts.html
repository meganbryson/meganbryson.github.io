<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/png" href="/assets/images/flav.png?">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        background: #f0f0f0;
        position: relative;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 1000;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        cursor: pointer;
        z-index: 1;
        transition: transform 0.2s ease;
    }

    .photo:hover {
        transform: scale(1.2);
    }

    .hero-photo {
        z-index: 9999;
    }

    .photo[data-expanded="true"] {
        transform: none !important;
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" class="top-left">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png" class="top-right">
    </a>
</div>

<script>
const DESKTOP_EXPAND = 0.45;
const MOBILE_EXPAND = 0.55;

const PHOTO_SCALE = 0.18;
const HERO_SCALE = 0.35;

const TOTAL_PHOTOS = 25;

const BASE_SPEED = 0.3;
const SPEED_VARIATION = 1.25;

const photosData = [];
let topZ = 100;

function bringToFront(el) {
    topZ++;
    el.style.zIndex = topZ;
}

function addClickExpand(img, obj) {
    img.addEventListener("click", () => {
        if (img.dataset.expanded === "true") return;

        img.dataset.expanded = "true";
        bringToFront(img);

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const isMobile = vw <= 768;

        const aspect = img.naturalHeight / img.naturalWidth;

        let maxW = isMobile ? vw * MOBILE_EXPAND : vw * DESKTOP_EXPAND;
        let maxH = isMobile ? vh * MOBILE_EXPAND : vh * DESKTOP_EXPAND;

        let w = maxW;
        let h = w * aspect;

        if (h > maxH) {
            h = maxH;
            w = h / aspect;
        }

        let x = (vw - w) / 2;
        let y = (vh - h) / 2;

        const pad = 12;
        x = Math.max(pad, Math.min(x, vw - w - pad));
        y = Math.max(pad, Math.min(y, vh - h - pad));

        obj.width = w;
        obj.height = h;
        obj.x = x;
        obj.y = y;

        img.style.width = w + "px";
        img.style.height = h + "px";
        img.style.left = x + "px";
        img.style.top = y + "px";

        setTimeout(() => {
            img.dataset.expanded = "false";
        }, 3000);
    });
}

function createPhotos() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;

    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        document.body.appendChild(img);

        img.onload = () => {
            const w = vw * PHOTO_SCALE;
            const h = w * (img.naturalHeight / img.naturalWidth);

            let x = Math.random() * (vw - w);
            let y = Math.random() * (vh - h - topBarHeight) + topBarHeight;

            img.style.width = w + "px";
            img.style.height = h + "px";
            img.style.left = x + "px";
            img.style.top = y + "px";

            const obj = {
                el: img,
                x, y,
                width: w,
                height: h,
                vx: (Math.random() - 0.5) * BASE_SPEED,
                vy: (Math.random() - 0.5) * BASE_SPEED
            };

            photosData.push(obj);
            addClickExpand(img, obj);
        };
    }

    // HERO (RESTORED + SAFE)
    const hero = document.createElement("img");
    hero.src = "assets/images/shots/text.jpg";
    hero.className = "photo hero-photo";

    document.body.appendChild(hero);

    hero.onload = () => {
        const w = vw * HERO_SCALE;
        const h = w * (hero.naturalHeight / hero.naturalWidth);

        const x = (vw - w) / 2;
        const y = (vh - h) / 2;

        hero.style.width = w + "px";
        hero.style.height = h + "px";
        hero.style.left = x + "px";
        hero.style.top = y + "px";

        const obj = {
            el: hero,
            x, y,
            width: w,
            height: h,
            vx: 0,
            vy: 0
        };

        photosData.push(obj);
        addClickExpand(hero, obj);
    };
}

function animate() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;

    photosData.forEach(p => {
        if (p.el.dataset.expanded === "true") return;

        p.x += p.vx;
        p.y += p.vy;

        if (p.x <= 0 || p.x + p.width >= vw) p.vx *= -1;

        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
        }

        if (p.y + p.height >= vh) {
            p.y = vh - p.height;
            p.vy *= -1;
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    requestAnimationFrame(animate);
};
</script>

</body>
</html>
