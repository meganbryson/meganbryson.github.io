<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/png" href="/assets/images/flav.png?">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        background: #f0f0f0;
        position: relative;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 1000;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left { order: 1; }
    .top-right { order: 3; }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        will-change: transform;
        z-index: 1;
    }

    .photo:hover {
        transform: scale(1.05);
        z-index: 2000;
    }

    .content {
        width: 80%;
        margin: 5vh auto;
        font-size: calc(16px + 0.5vw);
        text-align: center;
        line-height: 1.6;
    }

    @media (max-width: 768px) {
        .top-bar { height: 18vh; }

        .top-bar img {
            height: 55%;
            max-height: 80px;
        }

        .top-center {
            height: 55%;
        }

        .content {
            width: 90%;
            font-size: calc(14px + 1vw);
        }
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" class="top-left">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png" class="top-right">
    </a>
</div>

<script>
const PHOTO_SCALE = 0.12;
const HERO_SCALE = 0.28; // 🔥 bigger for photo25
const TOTAL_PHOTOS = 25;

const BASE_SPEED = 0.3;
const SPEED_VARIATION = 1.25;

const MOBILE_SCALE_MULTIPLIER = 1.6;

const photosData = [];
let topZ = 100; // 🔥 start higher so hero is above everything

function bringToFront(el) {
    topZ++;
    el.style.zIndex = topZ;
}

function createPhotos() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;
    const isMobile = window.innerWidth <= 768;

    // 🔹 Regular photos (1–24)
    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        img.onerror = () => img.remove();
        document.body.appendChild(img);

        img.onload = () => {
            let baseWidth = viewportWidth * PHOTO_SCALE;
            if (isMobile) baseWidth *= MOBILE_SCALE_MULTIPLIER;

            const aspectRatio = img.naturalHeight / img.naturalWidth;
            const width = baseWidth;
            const height = baseWidth * aspectRatio;

            let x = Math.random() * (viewportWidth - width);
            let y = Math.random() * (viewportHeight - height - topBarHeight) + topBarHeight;

            img.style.width = width + "px";
            img.style.height = height + "px";

            const speedMultiplier = 1 + Math.random() * (SPEED_VARIATION - 1);
            const vx = (Math.random() - 0.5) * BASE_SPEED * speedMultiplier;
            const vy = (Math.random() - 0.5) * BASE_SPEED * speedMultiplier;

            photosData.push({ el: img, x, y, width, height, vx, vy });
        };
    }

    // 🔥 HERO PHOTO (photo25)
    const hero = document.createElement("img");
    hero.src = `assets/images/shots/text.jpg`;
    hero.className = "photo";

    hero.onerror = () => hero.remove();
    document.body.appendChild(hero);

    hero.onload = () => {
        let baseWidth = viewportWidth * HERO_SCALE;
        if (isMobile) baseWidth *= MOBILE_SCALE_MULTIPLIER;

        const aspectRatio = hero.naturalHeight / hero.naturalWidth;
        const width = baseWidth;
        const height = baseWidth * aspectRatio;

        // 🔥 CENTER POSITION
        let x = (viewportWidth - width) / 2;
        let y = (viewportHeight - height) / 2;

        hero.style.width = width + "px";
        hero.style.height = height + "px";

        // 🔥 ALWAYS ON TOP INITIALLY
        hero.style.zIndex = topZ + 100;

        const vx = (Math.random() - 0.5) * BASE_SPEED;
        const vy = (Math.random() - 0.5) * BASE_SPEED;

        photosData.push({ el: hero, x, y, width, height, vx, vy });
    };
}

function animate() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    photosData.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        let bounced = false;

        if (p.x <= 0 || p.x + p.width >= viewportWidth) {
            p.vx *= -1;
            bounced = true;
        }

        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
            bounced = true;
        }

        if (p.y + p.height >= viewportHeight) {
            p.y = viewportHeight - p.height;
            p.vy *= -1;
            bounced = true;
        }

        if (bounced) bringToFront(p.el);

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    setTimeout(animate, 100);
};
</script>

<div class="content">
    <p>
    </p>
</div>

</body>
</html>
