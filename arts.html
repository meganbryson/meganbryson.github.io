<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow: hidden;
        background: #f0f0f0;
        position: relative;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 1000;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left { order: 1; }
    .top-right { order: 3; }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        will-change: transform;
        z-index: 1;
    }

    .photo:hover {
        transform: scale(1.05);
        z-index: 2000;
    }

    @media (max-width: 768px) {
        .top-bar { height: 18vh; }

        .top-bar img {
            height: 55%;
            max-height: 80px;
        }

        .top-center {
            height: 55%;
        }
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" class="top-left">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png" class="top-right">
    </a>
</div>

<script>
const PHOTO_SCALE = 0.12;
const TOTAL_PHOTOS = 24;

const BASE_SPEED = 0.3;
const SPEED_VARIATION = 1.25;

const MOBILE_SCALE_MULTIPLIER = 1.6; // 🔥 30% bigger on mobile

const photosData = [];
let topZ = 10;

function bringToFront(el) {
    topZ++;
    el.style.zIndex = topZ;
}

function createPhotos() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    const isMobile = window.innerWidth <= 768;

    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        img.onerror = () => {
            console.warn("Missing:", img.src);
            img.remove();
        };

        document.body.appendChild(img);

        img.onload = () => {
            let baseWidth = viewportWidth * PHOTO_SCALE;

            // 🔥 Apply mobile scaling
            if (isMobile) {
                baseWidth *= MOBILE_SCALE_MULTIPLIER;
            }

            const aspectRatio = img.naturalHeight / img.naturalWidth;

            const width = baseWidth;
            const height = baseWidth * aspectRatio;

            let x = Math.random() * (viewportWidth - width);
            let y = Math.random() * (viewportHeight - height - topBarHeight) + topBarHeight;

            img.style.width = width + "px";
            img.style.height = height + "px";

            const speedMultiplier = 1 + Math.random() * (SPEED_VARIATION - 1);

            const vx = (Math.random() - 0.5) * BASE_SPEED * speedMultiplier;
            const vy = (Math.random() - 0.5) * BASE_SPEED * speedMultiplier;

            photosData.push({
                el: img,
                x, y,
                width, height,
                vx, vy
            });
        };
    }
}

function animate() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = window.innerHeight;

    photosData.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        let bounced = false;

        if (p.x <= 0 || p.x + p.width >= viewportWidth) {
            p.vx *= -1;
            bounced = true;
        }

        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
            bounced = true;
        }

        if (p.y + p.height >= viewportHeight) {
            p.y = viewportHeight - p.height;
            p.vy *= -1;
            bounced = true;
        }

        if (bounced) {
            bringToFront(p.el);
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    setTimeout(animate, 100);
};
</script>

</body>
</html>
