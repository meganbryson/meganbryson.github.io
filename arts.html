<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: arts</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow-x: hidden;
        background: #f0f0f0;
        position: relative;
        min-height: 200vh;
    }

    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
        z-index: 10;
    }

    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left { order: 1; }
    .top-right { order: 3; }

    .content {
        width: 80%;
        margin: 5vh auto;
        font-size: calc(16px + 0.5vw);
        text-align: center;
    }

    .photo {
        position: absolute;
        object-fit: cover;
        border-radius: 4px;
        will-change: transform;
    }

    .photo:hover {
        transform: scale(1.05);
        z-index: 20;
    }

    @media (max-width: 768px) {
        .top-bar { height: 18vh; }

        .top-bar img {
            height: 55%;
            max-height: 80px;
        }

        .top-center { height: 55%; }

        .content {
            width: 90%;
            font-size: calc(14px + 1vw);
        }
    }
</style>
</head>

<body>

<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" class="top-left">
    </a>

    <img src="assets/images/creative.jpg" class="top-center">

    <a href="/">
        <img src="assets/images/megan.png" class="top-right">
    </a>
</div>

<div class="content"></div>

<script>
const PHOTO_SCALE = 0.18;
const TOTAL_PHOTOS = 24;

const photosData = [];

function createPhotos() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = document.body.scrollHeight;

    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
        const img = document.createElement("img");
        img.src = `assets/images/shots/photo${i}.jpg`;
        img.className = "photo";

        document.body.appendChild(img);

        img.onload = () => {
            const baseWidth = viewportWidth * PHOTO_SCALE;
            const aspectRatio = img.naturalHeight / img.naturalWidth;

            const width = baseWidth;
            const height = baseWidth * aspectRatio;

            let x = Math.random() * (viewportWidth - width);
            let y = Math.random() * (viewportHeight - height - topBarHeight) + topBarHeight;

            img.style.width = width + "px";
            img.style.height = height + "px";

            // random slow velocity
            const vx = (Math.random() - 0.5) * 0.3;
            const vy = (Math.random() - 0.5) * 0.3;

            photosData.push({
                el: img,
                x, y,
                width, height,
                vx, vy
            });
        };
    }
}

function animate() {
    const topBarHeight = document.querySelector(".top-bar").offsetHeight;
    const viewportWidth = window.innerWidth;
    const viewportHeight = document.body.scrollHeight;

    photosData.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        // LEFT / RIGHT bounce
        if (p.x <= 0 || p.x + p.width >= viewportWidth) {
            p.vx *= -1;
        }

        // TOP BAR bounce (no-go zone)
        if (p.y <= topBarHeight) {
            p.y = topBarHeight;
            p.vy *= -1;
        }

        // BOTTOM bounce
        if (p.y + p.height >= viewportHeight) {
            p.vy *= -1;
        }

        p.el.style.left = p.x + "px";
        p.el.style.top = p.y + "px";
    });

    requestAnimationFrame(animate);
}

window.onload = () => {
    createPhotos();
    setTimeout(animate, 100); // slight delay to ensure images load
};
</script>

</body>
</html>
