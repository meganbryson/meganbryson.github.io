<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Center image */
    .center-image {
        position: absolute;
        top: 50%;
        left: 50%;
        height: 50px;
        transform: translate(-50%, -50%);
        z-index: 10;
    }

    /* Floating images */
    .image {
        position: absolute;
        height: 50px;
    }
</style>
</head>

<body>

<img src="assets/images/megan.png" class="center-image">

<script>
const images = [
    'assets/images/aboutme.png',
    'assets/images/chart.png',
    'assets/images/contact.png',
    'assets/images/drivers.png',
    'assets/images/evn.png',
    'assets/images/imade.png',
    'assets/images/linkedin.png',
    'assets/images/map.png',
    'assets/images/metal.png',
    'assets/images/pepto.png',
    'assets/images/raccoon.png',
    'assets/images/resumecar.png',
    'assets/images/tims.png',
    'assets/images/toronto.png',
    'assets/images/ttc.png'
];

function placeImagesRandomly() {
    const body = document.body;

    images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.classList.add('image');

        img.onload = function () {
            body.appendChild(img); // MUST append first

            let attempts = 0;
            let placed = false;

            while (!placed && attempts < 100) {
                const x = Math.random() * (window.innerWidth - img.width);
                const y = Math.random() * (window.innerHeight - img.height);

                img.style.left = x + 'px';
                img.style.top = y + 'px';

                if (!collides(img)) {
                    placed = true;
                }

                attempts++;
            }

            // If we fail, just leave it somewhere
            if (!placed) {
                img.style.left = Math.random() * (window.innerWidth - img.width) + 'px';
                img.style.top = Math.random() * (window.innerHeight - img.height) + 'px';
            }
        };
    });
}

function collides(img) {
    const rect1 = img.getBoundingClientRect();

    // Check against ALL images including center
    const allImages = document.querySelectorAll('img');

    for (const other of allImages) {
        if (other === img) continue;

        const rect2 = other.getBoundingClientRect();

        if (
            rect1.left < rect2.right &&
            rect1.right > rect2.left &&
            rect1.top < rect2.bottom &&
            rect1.bottom > rect2.top
        ) {
            return true;
        }
    }
    return false;
}

document.addEventListener('DOMContentLoaded', placeImagesRandomly);
</script>

</body>
</html>
