<!DOCTYPE html>
<html lang="en">
<head>
<link rel="shortcut icon" type="image/png" href="/assets/images/flav.png?">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        background: transparent;
    }

    /* Megan image always on top */
    .center {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 999;
    }

    /* Background images */
    .bg-img {
        position: absolute;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center;
        z-index: 10;
    }

    /* Foreground images */
    .fg-img {
        position: absolute;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center;
        z-index: 100;
    }

    /* Other images */
    .img {
        position: absolute;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center;
        z-index: 50;
    }

    /* Shared clickable behavior */
    .clickable img {
        transition: transform 0.3s ease, opacity 0.3s ease;
        cursor: pointer;
    }

    .clickable img:hover,
    .clickable img:active {
        transform: translate(-50%, -50%) scale(calc(var(--scale, 1) * 1.1));
        opacity: 0.85;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
        .center {
            left: 63%;
        }

        .bg-img,
        .fg-img,
        .img {
            transform: translate(-50%, -50%) scale(calc(var(--scale, 1) * 0.5));
        }

        #resumecar { top: 78% !important; left: 20% !important; }
        #contact { top: 8% !important; left: 60%; }
        #aboutme { top: 10% !important; }
        #ttc { top: 50% !important; }
        #tims { top: 70% !important; }
        #toronto { left: 95% !important; }
        #pepto { left: 90% !important; top: 20% !important; }
        #menu { top: 28% !important; left: 20% !important; }
        #metalblack { top: 35% !important; }
        #raccoon { top: 70% !important; }
        #linkedin { top: 42% !important; }
    }
</style>
</head>

<body>

<!-- Megan -->
<img src="assets/images/megan.png" class="center" id="megan">

<!-- Background -->
<img src="assets/images/map.png" class="bg-img" style="--scale: 0.25; top: 75%; left: 58%;" id="map">
<img src="assets/images/metalblack.png" class="bg-img" style="--scale: 0.3; top: 45%; left: 15%;" id="metal">

<!-- Clickable Foreground -->

<a href="/about.html" class="clickable">
    <img src="assets/images/aboutme.png" class="fg-img" style="--scale: 0.3; top: 20%; left: 30%;" id="aboutme">
</a>

<a href="/contact.html" class="clickable">
    <img src="assets/images/contactblack (6).png" class="fg-img" style="--scale: 0.35; top: 15%; left: 85%;" id="contact">
</a>

<a href="/imade.html" class="clickable">
    <img src="assets/images/imade.png" class="fg-img" style="--scale: 0.3; top: 55%; left: 75%;" id="imade">
</a>

<a href="/resume.html" class="clickable">
    <img src="assets/images/resumecar.png" class="fg-img" style="--scale: 0.35; top: 90%; left: 15%;" id="resumecar">
</a>

<a href="/menu.html" class="clickable">
    <img src="assets/images/menu.png" class="fg-img" style="--scale: 0.25; top: 15%; left: 10%;" id="menu">
</a>

<!-- Other clickable (LinkedIn external) -->
<a href="https://www.linkedin.com/in/megan-bryson-29373630b/" target="_blank" class="clickable">
    <img src="assets/images/linkedin.png" class="img" style="--scale: 0.3; top: 40%; left: 90%;" id="linkedin">
</a>

<!-- Other images -->
<img src="assets/images/chart.png" class="img" style="--scale: 0.25; top: 85%; left: 70%;" id="chart">
<img src="assets/images/drivers.png" class="img" style="--scale: 0.3; top: 65%; left: 25%;" id="drivers">
<img src="assets/images/pepto.png" class="img" style="--scale: 0.25; top: 15%; left: 65%;" id="pepto">
<img src="assets/images/raccoon.png" class="img" style="--scale: 0.25; top: 80%; left: 90%;" id="raccoon">
<img src="assets/images/tims.png" class="img" style="--scale: 0.25; top: 90%; left: 40%;" id="tims">
<img src="assets/images/toronto.png" class="img" style="--scale: 0.25; top: 35%; left: 75%;" id="toronto">
<img src="assets/images/ttc.png" class="img" style="--scale: 0.5; top: 60%; left: 45%;" id="ttc">

<script>
    const mobileScale = 1.5;

    function resizeMegan() {
        const megan = document.getElementById('megan');
        const h = window.innerHeight;
        const w = window.innerWidth;

        let newHeight = Math.min(h * 0.3, w * 0.2);

        if (w <= 768) newHeight *= mobileScale;

        megan.style.height = `${newHeight}px`;
    }

    function adjustPositions() {
        const megan = document.getElementById('megan');
        const meganRect = megan.getBoundingClientRect();
        const fgImages = document.querySelectorAll('.fg-img');

        fgImages.forEach(img => {
            const r = img.getBoundingClientRect();
            if (
                r.left < meganRect.right &&
                r.right > meganRect.left &&
                r.top < meganRect.bottom &&
                r.bottom > meganRect.top
            ) {
                img.style.top = `${parseFloat(img.style.top) - 10}%`;
            }
        });
    }

    window.addEventListener('load', () => {
        resizeMegan();
        adjustPositions();
    });

    window.addEventListener('resize', () => {
        resizeMegan();
        adjustPositions();
    });
</script>

</body>
</html>
