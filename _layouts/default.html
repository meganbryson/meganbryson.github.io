<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Center image */
    .center-image {
        position: absolute;
        top: 50%;
        left: 50%;
        height: 200px;
        transform: translate(-50%, -50%);
        z-index: 10;
    }

    /* Floating images */
    .image {
        position: absolute;
    }
</style>
</head>

<body>

<img src="assets/images/megan.png" class="center-image">

<script>
const images = [
    { src: 'assets/images/aboutme.png', scale: 0.4 },
    { src: 'assets/images/chart.png', scale: 0.2 },
    { src: 'assets/images/contact.png', scale: 0.4 },
    { src: 'assets/images/drivers.png', scale: 0.3},
    { src: 'assets/images/evn.png', scale: 0.2 },
    { src: 'assets/images/imade.png', scale: 0.4 },
    { src: 'assets/images/linkedin.png', scale: 0.3 },
    { src: 'assets/images/map.png', scale: 0.2 },
    { src: 'assets/images/metal.png', scale: 0.2 },
    { src: 'assets/images/pepto.png', scale: 0.2 },
    { src: 'assets/images/raccoon.png', scale: 0.2 },
    { src: 'assets/images/resumecar.png', scale: 0.3 },
    { src: 'assets/images/tims.png', scale: 0.2},
    { src: 'assets/images/toronto.png', scale: 0.2 },
    { src: 'assets/images/ttc.png', scale: 0.2 }
];

function placeImagesRandomly() {
    const body = document.body;

    images.forEach(item => {
        const img = document.createElement('img');
        img.src = item.src;
        img.classList.add('image');

        img.onload = function () {
            body.appendChild(img);

            // Apply individual scaling
            img.style.transform = `scale(${item.scale})`;
            img.style.transformOrigin = 'top left';

            let attempts = 0;
            let placed = false;

            const scaledWidth = img.naturalWidth * item.scale;
            const scaledHeight = img.naturalHeight * item.scale;

            while (!placed && attempts < 100) {
                const x = Math.random() * (window.innerWidth - scaledWidth);
                const y = Math.random() * (window.innerHeight - scaledHeight);

                img.style.left = x + 'px';
                img.style.top = y + 'px';

                if (!collides(img)) {
                    placed = true;
                }

                attempts++;
            }
        };
    });
}

function collides(img) {
    const rect1 = img.getBoundingClientRect();
    const allImages = document.querySelectorAll('img');

    for (const other of allImages) {
        if (other === img) continue;

        const rect2 = other.getBoundingClientRect();

        if (
            rect1.left < rect2.right &&
            rect1.right > rect2.left &&
            rect1.top < rect2.bottom &&
            rect1.bottom > rect2.top
        ) {
            return true;
        }
    }
    return false;
}

document.addEventListener('DOMContentLoaded', placeImagesRandomly);
</script>

</body>
</html>
