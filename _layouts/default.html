<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Random Image Layout</title>
    <style>
        body {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }
        .image {
            position: absolute;
            transition: all 0.5s;
            height: 200px;
        }
    </style>
</head>
<body>

<script src="script.js"></script>
<script>
    const images = [
        'assets/images/aboutme.png',
    'assets/images/chart.png',
    'assets/images/contact.png',
    'assets/images/drivers.png',
    'assets/images/evn.png',
    'assets/images/imade.png',
    'assets/images/linkedin.png',
    'assets/images/map.png',
    'assets/images/megan.png',
    'assets/images/megan2.png',
    'assets/images/metal.png',
    'assets/images/pepto.png',
    'assets/images/raccoon.png',
    'assets/images/resume2.png',
    'assets/images/resumecar.png',
    'assets/images/tims.png',
    'assets/images/toronto.png',
    'assets/images/ttc.png'
    ];

    function placeImagesRandomly() {
        const body = document.body;
        images.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.classList.add('image');
            img.onload = function() {
                let placed = false;
                while (!placed) {
                    const x = Math.floor(Math.random() * (body.clientWidth - img.width));
                    const y = Math.floor(Math.random() * (body.clientHeight - img.height));
                    img.style.left = x + 'px';
                    img.style.top = y + 'px';
                    if (!collides(img)) {
                        body.appendChild(img);
                        placed = true;
                    }
                }
            };
        });
    }

    // Check for collisions
    function collides(img) {
        const imgRect = img.getBoundingClientRect();
        const images = document.querySelectorAll('.image');
        for (const otherImg of images) {
            if (otherImg !== img) {
                const otherRect = otherImg.getBoundingClientRect();
                if (
                    imgRect.x < otherRect.x + otherRect.width &&
                    imgRect.x + imgRect.width > otherRect.x &&
                    imgRect.y < otherRect.y + otherRect.height &&
                    imgRect.y + imgRect.height > otherRect.y
                ) {
                    return true;
                }
            }
        }
        return false;
    }

    document.addEventListener('DOMContentLoaded', placeImagesRandomly);
</script>
</body>
</html>
