<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Center image */
    .center-image {
        position: absolute;
        top: 30%;
        left: 50%;
        height: 220px;
        transform: translate(-50%, -50%);
        z-index: 10;
    }

    .image {
        position: absolute;
    }
</style>
</head>

<body>

<img src="assets/images/megan.png" class="center-image">

<script>
const images = [
    { src: 'assets/images/aboutme.png', scale: 0.3 },
    { src: 'assets/images/chart.png', scale: 0.2 },
    { src: 'assets/images/contact.png', scale: 0.3 },
    { src: 'assets/images/drivers.png', scale: 0.3},
    { src: 'assets/images/evn.png', scale: 0.2 },
    { src: 'assets/images/imade.png', scale: 0.3 },
    { src: 'assets/images/linkedin.png', scale: 0.3 },
    { src: 'assets/images/map.png', scale: 0.2 },
    { src: 'assets/images/metal.png', scale: 0.3 },
    { src: 'assets/images/pepto.png', scale: 0.2 },
    { src: 'assets/images/raccoon.png', scale: 0.2 },
    { src: 'assets/images/resumecar.png', scale: 0.3 },
    { src: 'assets/images/tims.png', scale: 0.2},
    { src: 'assets/images/toronto.png', scale: 0.2 },
    { src: 'assets/images/ttc.png', scale: 0.2 }
];

let placedImages = [];

function layoutImages() {
    // clear old ones
    placedImages.forEach(img => img.remove());
    placedImages = [];

    const padding = 20;
    const cols = Math.ceil(Math.sqrt(images.length));
    const rows = Math.ceil(images.length / cols);

    const cellWidth = window.innerWidth / cols;
    const cellHeight = window.innerHeight / rows;

    images.forEach((item, index) => {
        const img = document.createElement('img');
        img.src = item.src;
        img.classList.add('image');

        img.onload = function () {
            document.body.appendChild(img);

            img.style.transform = `scale(${item.scale})`;
            img.style.transformOrigin = 'top left';

            const col = index % cols;
            const row = Math.floor(index / cols);

            const scaledWidth = img.naturalWidth * item.scale;
            const scaledHeight = img.naturalHeight * item.scale;

            // base position (grid)
            let x = col * cellWidth + padding;
            let y = row * cellHeight + padding;

            // add jitter so it feels random
            const jitterX = (cellWidth - scaledWidth - padding * 2) * Math.random();
            const jitterY = (cellHeight - scaledHeight - padding * 2) * Math.random();

            x += Math.max(0, jitterX);
            y += Math.max(0, jitterY);

            img.style.left = x + 'px';
            img.style.top = y + 'px';

            placedImages.push(img);
        };
    });
}

// re-layout on resize (important for mobile)
let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(layoutImages, 200);
});

document.addEventListener('DOMContentLoaded', layoutImages);
</script>

</body>
</html>
