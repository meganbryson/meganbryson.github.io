<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Center image */
    .center {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 25vh; /* responsive */
        z-index: 10;
    }

    /* All other images */
    .img {
        position: absolute;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center;
    }
</style>
</head>

<body>

<!-- Center -->
<img src="assets/images/megan.png" class="center">

<!-- Surrounding images -->
<img src="assets/images/aboutme.png" class="img" style="--scale: 0.3; top: 20%; left: 30%;" id="aboutme">

<img src="assets/images/evn.png" class="img" style="--scale: 0.25; top: 15%; left: 10%;" id="evn">
