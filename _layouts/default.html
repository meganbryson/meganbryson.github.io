<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson</title>

<style>
    body {
        position: relative;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    /* Center image */
    .center {
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 25vh;
        z-index: 10;
    }

    /* Base image style */
    .img {
        position: absolute;
        transform: translate(-50%, -50%) scale(var(--scale));
        transform-origin: center;
    }

    /* Responsive base scale */
    :root {
        --base-scale: calc(min(100vw, 100vh) / 1200);
    }

    /* Size tiers (relative to original image size) */
    .small  { --scale: calc(var(--base-scale) * 0.6); }
    .medium { --scale: calc(var(--base-scale) * 1.0); }
    .large  { --scale: calc(var(--base-scale) * 1.4); }

    /* 📍 POSITIONING (edit these) */

    #aboutme   { top: 10%; left: 20%; }
    #contact   { top: 10%; left: 80%; }
    #imade     { top: 55%; left: 85%; }
    #resumecar { top: 75%; left: 20%; }

    #chart     { top: 85%; left: 70%; }
    #drivers   { top: 65%; left: 5%; }
    #evn       { top: 20%; left: 5%; }
    #linkedin  { top: 40%; left: 90%; }
    #map       { top: 80%; left: 50%; }
    #metal     { top: 50%; left: 10%; }
    #pepto     { top: 15%; left: 60%; }
    #raccoon   { top: 70%; left: 85%; }
    #tims      { top: 90%; left: 30%; }
    #toronto   { top: 35%; left: 75%; }
    #ttc       { top: 60%; left: 50%; }

</style>
</head>

<body>

<!-- Center -->
<img src="assets/images/megan.png" class="center">

<!-- Surrounding images -->
<img src="assets/images/aboutme.png" class="img medium" id="aboutme">
<img src="assets/images/contact.png" class="img large" id="contact">
<img src="assets/images/imade.png" class="img medium" id="imade">
<img src="assets/images/resumecar.png" class="img large" id="resumecar">

<img src="assets/images/chart.png" class="img small" id="chart">
<img src="assets/images/drivers.png" class="img small" id="drivers">
<img src="assets/images/evn.png" class="img small" id="evn">
<img src="assets/images/linkedin.png" class="img small" id="linkedin">
<img src="assets/images/map.png" class="img small" id="map">
<img src="assets/images/metal.png" class="img small" id="metal">
<img src="assets/images/pepto.png" class="img small" id="pepto">
<img src="assets/images/raccoon.png" class="img small" id="raccoon">
<img src="assets/images/tims.png" class="img small" id="tims">
<img src="assets/images/toronto.png" class="img small" id="toronto">
<img src="assets/images/ttc.png" class="img small" id="ttc">

</body>
</html>
