<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: menu</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Courier New", Courier, monospace;
        overflow-x: hidden;
        background: #f0f0f0;
    }

    /* Top bar container */
    .top-bar {
        position: relative;
        width: 100%;
        height: 15vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 2vw;
        box-sizing: border-box;
    }

    /* Images in top bar */
    .top-bar img {
        height: 80%;
        max-height: 120px;
        object-fit: contain;
    }

    /* Center image in top bar */
    .top-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 80%;
    }

    .top-left {
        order: 1;
    }

    .top-right {
        order: 3;
    }

    /* Middle content */
    .content {
        width: 80%;
        margin: 5vh auto;
        font-size: calc(16px + 0.5vw);
        text-align: center;
        line-height: 1.6;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
        .top-bar {
            height: 18vh;
        }

        /* 🔽 Make images smaller on mobile */
        .top-bar img {
            height: 55%;        /* smaller than before */
            max-height: 80px;   /* cap size */
        }

        .top-center {
            height: 55%; /* keep center consistent */
        }

        .content {
            width: 90%;
            font-size: calc(14px + 1vw);
        }

         .btn {
        width: 12vh; /* adjust this number to taste */
    }
    }

   


/* Buttons */
.btn {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 20vh; /* control size */
    height: auto;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 20;
}

 /* Shared clickable behavior */
    .clickable img {
        transition: transform 0.3s ease, opacity 0.3s ease;
        cursor: pointer;
    }

    .clickable img:hover,
    .clickable img:active {
        transform: translate(-50%, -50%) scale(calc(var(--scale, 1) * 1.1));
        opacity: 0.85;
    }


}
</style>
</head>
<body>

<div class="top-bar">
    <a href="/menu.html" class="home-button">
        <img src="assets/images/menu.png" alt="Menu" class="top-left">
    </a>

    
<a href="/" class="home-button">
    <img src="assets/images/megan.png" alt="Megan" class="top-right">
    </a>
</div>

    
<div class="content">
    <div class="center-text">
        <p>
        
               <a href="/about.html">about<br></a>

    <a href="/contact.html">contact<br></a>

    <a href="/imade.html">stuff i made<br></a>

    <a href="/resume.html">resume<br></a>

    <a href="https://www.linkedin.com/in/megan-bryson-29373630b/">linkedin<br></a>
        </p>
    </div>

    <!-- Buttons positioned around the center -->
    <a href="/about.html" class="clickable">
        <img src="assets/images/aboutme.png" class="btn" style="top: 35%; left: 30%;" alt="About">
    </a>

    <a href="/contact.html" class="clickable">
        <img src="assets/images/contactblack (6).png" class="btn" style="top: 55%; left: 20%;" alt="Contact">
    </a>

    <a href="/imade.html" class="clickable">
        <img src="assets/images/imade.png" class="btn" style="top: 30%; left: 80%;" alt="I Made">
    </a>

    <a href="/resume.html" class="clickable">
        <img src="assets/images/resumecar.png" class="btn" style="top: 50%; left: 75%;" alt="Resume">
    </a>

    <a href="https://www.linkedin.com/in/megan-bryson-29373630b/" target="_blank" class="clickable">
        <img src="assets/images/linkedin.png" class="btn" style="top: 50%; left: 60%;" alt="LinkedIn">
    </a>
</div>

    
</body>
</html>
