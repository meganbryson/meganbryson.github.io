<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>megan bryson: menu</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: "Courier New", Courier, monospace;
    overflow-x: hidden;
    background: #f0f0f0;
}

/* =========================
   TOP BAR
========================= */
.top-bar {
    position: relative;
    width: 100%;
    height: 15vh;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2vw;
}

.top-bar img {
    height: 80%;
    max-height: 120px;
    object-fit: contain;
}

/* =========================
   CONTENT AREA
========================= */


     .content {
        width: 80%;
        margin: 5vh auto;
        font-size: calc(16px + 0.5vw);
        text-align: center;
        line-height: 1.6;
    }
/* Center text */


/* =========================
   BUTTON BASE
========================= */
.btn {
    position: absolute;
    transform: translate(-50%, -50%) scale(var(--scale, 1));
    width: 20vh;
    height: auto;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 20;
}

/* Hover effect */
.clickable img:hover {
    transform: translate(-50%, -50%) scale(calc(var(--scale, 1) * 1.1));
    opacity: 0.85;
    cursor: pointer;
}

/* =========================
   DESKTOP POSITIONS + SCALES
========================= */
#about {
    top: 25%;
    left: 25%;
    --scale: 1;
}

#contact {
    top: 60%;
    left: 20%;
    --scale: 1.2;
}

#imade {
    top: 35%;
    left: 85%;
    --scale: 1.3;
}

#resume {
    top: 45%;
    left: 75%;
    --scale: 1.2;
}

#linkedin {
    top: 40%;
    left: 60%;
    --scale: 0.8;
}

/* =========================
   MOBILE OVERRIDES
========================= */
@media (max-width: 768px) {

    .top-bar {
        height: 18vh;
    }

    .top-bar img {
        height: 55%;
        max-height: 80px;
    }

    .center-text {
        width: 85vw;
        font-size: calc(14px + 1vw);
    }

    /* Global button size reduction */
    .btn {
        width: 12vh;
    }

    /* 🔥 Individual mobile control */

    #about {
        top: 50%;
        left: 20%;
        --scale: 0.9;
    }

    #contact {
        top: 20%;
        left: 25%;
        --scale: 0.9;
    }

    #imade {
        top: 20%;
        left: 70%;
        --scale: 0.9;
    }

    #resume {
        top: 75%;
        left: 75%;
        --scale: 1;
    }

    #linkedin {
        top: 60%;
        left: 60%;
        --scale: 0.8;
    }
}
</style>
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<div class="top-bar">
    <a href="/menu.html">
        <img src="assets/images/menu.png" alt="Menu">
    </a>

    <a href="/">
        <img src="assets/images/megan.png" alt="Megan">
    </a>
</div>

<!-- =========================
     MAIN CONTENT
========================= -->
<div class="content">

    <!-- Center text -->
    <div class="content">
        <p>
            <a href="/about.html">about</a><br>
            <a href="/contact.html">contact</a><br>
            <a href="/imade.html">stuff i made</a><br>
            <a href="/resume.html">resume</a><br>
            <a href="https://www.linkedin.com/in/megan-bryson-29373630b/" target="_blank">linkedin</a>
        </p>
    </div>

    <!-- Buttons -->
    <a href="/about.html" class="clickable">
        <img src="assets/images/aboutme.png" class="btn" id="about" alt="About">
    </a>

    <a href="/contact.html" class="clickable">
        <img src="assets/images/contactblack (6).png" class="btn" id="contact" alt="Contact">
    </a>

    <a href="/imade.html" class="clickable">
        <img src="assets/images/imade.png" class="btn" id="imade" alt="I Made">
    </a>

    <a href="/resume.html" class="clickable">
        <img src="assets/images/resumecar.png" class="btn" id="resume" alt="Resume">
    </a>

    <a href="https://www.linkedin.com/in/megan-bryson-29373630b/" target="_blank" class="clickable">
        <img src="assets/images/linkedin.png" class="btn" id="linkedin" alt="LinkedIn">
    </a>

</div>

</body>
</html>
